name: Docker

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      release_tag:
        description: Git tag to publish, for example v0.2.0
        required: true
        type: string
      latest:
        description: Also publish the latest tag
        required: true
        default: true
        type: boolean

permissions:
  contents: read

env:
  IMAGE_NAME: vdustr/font-splitter

jobs:
  publish:
    name: Publish Docker Hub image
    runs-on: ubuntu-latest

    steps:
      - name: Resolve Docker tags
        id: release
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            release_tag="${{ inputs.release_tag }}"
            publish_latest="${{ inputs.latest }}"
          else
            release_tag="${{ github.event.release.tag_name }}"
            publish_latest="${{ github.event.release.prerelease == false }}"
          fi

          if [[ ! "$release_tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "Expected a release tag like v0.2.0, got: $release_tag" >&2
            exit 1
          fi

          version="${release_tag#v}"
          tags="${IMAGE_NAME}:${release_tag}"$'\n'"${IMAGE_NAME}:${version}"
          if [ "$publish_latest" = "true" ]; then
            tags="${tags}"$'\n'"${IMAGE_NAME}:latest"
          fi

          {
            echo "release_tag=${release_tag}"
            echo "version=${version}"
            echo "tags<<EOF"
            echo "${tags}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.release_tag }}

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          username: vdustr
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.release.outputs.tags }}
          labels: |
            org.opencontainers.image.title=font-splitter
            org.opencontainers.image.description=Python library and CLI for splitting large fonts into unicode-range WOFF/WOFF2 subsets.
            org.opencontainers.image.source=https://github.com/VdustR/font-splitter
            org.opencontainers.image.url=https://github.com/VdustR/font-splitter
            org.opencontainers.image.version=${{ steps.release.outputs.version }}
            org.opencontainers.image.licenses=MIT
