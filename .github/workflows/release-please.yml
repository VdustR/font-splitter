name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

env:
  IMAGE_NAME: vdustr/font-splitter

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: .github/release-please-config.json
          manifest-file: .release-please-manifest.json

      - uses: actions/checkout@v6
        if: ${{ steps.release.outputs.release_created == 'true' }}
        with:
          ref: ${{ steps.release.outputs.tag_name }}

      - uses: actions/setup-python@v6
        if: ${{ steps.release.outputs.release_created == 'true' }}
        with:
          python-version: "3.12"

      - name: Build release distributions
        if: ${{ steps.release.outputs.release_created == 'true' }}
        run: |
          python -m pip install build
          python -m build

      - name: Upload distributions to GitHub Release
        if: ${{ steps.release.outputs.release_created == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ steps.release.outputs.tag_name }}" dist/* --clobber

      - name: Resolve Docker tags
        id: docker-release
        if: ${{ steps.release.outputs.release_created == 'true' }}
        shell: bash
        run: |
          release_tag="${{ steps.release.outputs.tag_name }}"
          if [[ ! "$release_tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "Expected a release tag like v0.2.0, got: $release_tag" >&2
            exit 1
          fi

          version="${release_tag#v}"
          tags="${IMAGE_NAME}:${release_tag}"$'\n'"${IMAGE_NAME}:${version}"$'\n'"${IMAGE_NAME}:latest"

          {
            echo "version=${version}"
            echo "tags<<EOF"
            echo "${tags}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v4
        if: ${{ steps.release.outputs.release_created == 'true' }}

      - uses: docker/setup-buildx-action@v4
        if: ${{ steps.release.outputs.release_created == 'true' }}

      - uses: docker/login-action@v4
        if: ${{ steps.release.outputs.release_created == 'true' }}
        with:
          username: vdustr
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        if: ${{ steps.release.outputs.release_created == 'true' }}
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.docker-release.outputs.tags }}
          labels: |
            org.opencontainers.image.title=font-splitter
            org.opencontainers.image.description=Python library and CLI for splitting large fonts into unicode-range WOFF/WOFF2 subsets.
            org.opencontainers.image.source=https://github.com/VdustR/font-splitter
            org.opencontainers.image.url=https://github.com/VdustR/font-splitter
            org.opencontainers.image.version=${{ steps.docker-release.outputs.version }}
            org.opencontainers.image.licenses=MIT
