name: Docker Hub Metadata

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/dockerhub/README.md
      - .github/workflows/dockerhub-metadata.yml

permissions:
  contents: read

jobs:
  update:
    name: Update Docker Hub metadata
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Update Docker Hub repository description
        uses: peter-evans/dockerhub-description@v5
        with:
          username: vdustr
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: vdustr/font-splitter
          short-description: Python library and CLI for splitting fonts into unicode-range WOFF/WOFF2 subsets.
          readme-filepath: .github/dockerhub/README.md
